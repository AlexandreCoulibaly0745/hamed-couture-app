name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer dependances
        run: npm install

      - name: Builder React
        run: npm run build

      - name: Initialiser Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Decoder keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/hamed-couture.keystore
          ls -la android/app/

      - name: Permission Gradle
        run: chmod +x android/gradlew

      - name: Compiler APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/hamed-couture.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Uploader APK
        uses: actions/upload-artifact@v4
        with:
          name: hamed-couture-app
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
