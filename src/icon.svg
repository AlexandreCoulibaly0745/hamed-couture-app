<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1E1108"/>
  <circle cx="256" cy="256" r="200" fill="#2A160A"/>
  <!-- Ciseaux stylisés -->
  <g transform="translate(256,256)">
    <circle r="180" fill="none" stroke="#D4A853" stroke-width="8" opacity="0.3"/>
    <!-- Lame 1 -->
    <path d="M-20,-120 L20,0 L-20,120 Q-60,80 -40,0 Q-60,-80 -20,-120Z" fill="#D4A853" opacity="0.9"/>
    <!-- Lame 2 -->
    <path d="M20,-120 L-20,0 L20,120 Q60,80 40,0 Q60,-80 20,-120Z" fill="#B85030" opacity="0.9"/>
    <!-- Centre -->
    <circle r="18" fill="#D4A853"/>
    <circle r="10" fill="#1E1108"/>
    <!-- Poignées -->
    <ellipse cx="-50" cy="-140" rx="25" ry="35" fill="none" stroke="#D4A853" stroke-width="8"/>
    <ellipse cx="50" cy="-140" rx="25" ry="35" fill="none" stroke="#B85030" stroke-width="8"/>
  </g>
  <!-- HT initiales -->
  <text x="256" y="420" text-anchor="middle" font-family="serif" font-size="52" font-weight="bold" fill="#D4A853" opacity="0.8">HT</text>
</svg>
